<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智教码航 - 智能体 Skill 评测演示平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #131924;
            --bg-tertiary: #1b2332;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #2e3c54;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --glass-bg: rgba(19, 25, 36, 0.7);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Layout Container */
        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        /* Sidebar - Left (Skills list) */
        .sidebar {
            width: 320px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        .sidebar-header {
            margin-bottom: 24px;
        }

        .sidebar-header h2 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.025em;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .sidebar-header p {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 12px;
            margin-top: 16px;
        }

        .skill-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .skill-card {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .skill-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .skill-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .skill-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .skill-version {
            font-size: 10px;
            background-color: var(--border-color);
            color: var(--text-secondary);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .skill-desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .skill-schema {
            background-color: var(--bg-primary);
            border-radius: 6px;
            padding: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-secondary);
            overflow-x: auto;
        }

        /* Chat Area - Center */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: rgba(10, 14, 23, 0.4);
            border-right: 1px solid var(--border-color);
        }

        .chat-header {
            height: 70px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background-color: var(--bg-secondary);
        }

        .chat-title h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--success-color);
            background-color: rgba(16, 185, 129, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success-color);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success-color);
        }

        .messages-container {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
        }

        .message.agent {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
        }

        .message.user .message-bubble {
            background-color: var(--accent-color);
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .message.agent .message-bubble {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .message-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            display: flex;
            gap: 12px;
        }

        /* Routing Trace Animation */
        .routing-trace {
            background-color: rgba(27, 35, 50, 0.5);
            border-left: 3px solid var(--warning-color);
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 8px;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(-10px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .trace-header {
            font-weight: 600;
            color: var(--warning-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .trace-step {
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Input Controls */
        .chat-input-container {
            padding: 24px;
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }

        .controls-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 16px;
        }

        .selector-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .selector-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .skill-select {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .skill-select:focus {
            border-color: var(--accent-color);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 4px 12px;
            align-items: center;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .chat-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            padding: 12px 0;
            font-size: 14px;
            outline: none;
        }

        .send-btn {
            background-color: var(--accent-color);
            color: var(--text-primary);
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .send-btn:hover {
            background-color: var(--accent-hover);
        }

        .send-btn:disabled {
            background-color: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        /* Inspector Panel - Right (JSON response inspector) */
        .inspector-panel {
            width: 360px;
            background-color: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        .inspector-header {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .inspector-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .inspector-content {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
            white-space: pre-wrap;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            flex-content: 1;
            overflow-y: auto;
            line-height: 1.5;
        }

        /* Suggestions Row */
        .suggestions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .suggestion-chip {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-chip:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        .error-banner {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error-color);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container" id="app">
        <!-- Left Panel: Skill Library -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>🤖 智教码航 MVP</h2>
                <p>智能体 Skill 调用与评测</p>
            </div>
            
            <div class="section-title">大模型 API 配置</div>
            <div style="background-color: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 12px; padding: 14px; margin-bottom: 16px; display: flex; flex-direction: column; gap: 10px;">
                <div>
                    <label style="font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 4px;">接口秘钥 (API Key)</label>
                    <input type="password" id="cfgApiKey" placeholder="未配置密钥 (默认规则模式)" style="width: 100%; background-color: var(--bg-primary); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 6px; padding: 6px 8px; font-size: 11px; outline: none;">
                </div>
                <div>
                    <label style="font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 4px;">接口基础路径 (Base URL)</label>
                    <input type="text" id="cfgBaseUrl" placeholder="https://api.openai.com/v1" style="width: 100%; background-color: var(--bg-primary); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 6px; padding: 6px 8px; font-size: 11px; outline: none;">
                </div>
                <div>
                    <label style="font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 4px;">模型名称 (Model)</label>
                    <input type="text" id="cfgModel" placeholder="gpt-3.5-turbo" style="width: 100%; background-color: var(--bg-primary); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 6px; padding: 6px 8px; font-size: 11px; outline: none;">
                </div>
                <button onclick="saveConfig()" style="background-color: var(--accent-color); color: var(--text-primary); border: none; padding: 8px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: background-color 0.2s;">保存并应用配置</button>
            </div>

            <div class="section-title">当前可用的 Skill 库</div>
            <div class="skill-list" id="skillList">
                <div style="color: var(--text-muted); font-size: 13px;">正在加载技能库数据...</div>
            </div>
        </div>

        <!-- Center Panel: Chat Interface -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-title">
                    <h1>智能体任务编排工作区</h1>
                </div>
                <div class="status-badge">
                    <div class="status-dot"></div>
                    <span>系统服务在线</span>
                </div>
            </div>

            <!-- Messages Window -->
            <div class="messages-container" id="messagesContainer">
                <div class="message agent">
                    <div class="message-bubble">
                        你好！我是你的学术与编程副驾驶。今天想要开启什么任务？我会在后台自动选择并运行最合适的 Skill。
                    </div>
                    <div class="message-meta">
                        <span>智能路由 (Agent Router)</span>
                    </div>
                </div>
            </div>

            <!-- Input Controls Area -->
            <div class="chat-input-container">
                <div class="error-banner" id="errorBanner"></div>
                
                <!-- Quick suggestions -->
                <div class="suggestions">
                    <div class="suggestion-chip" onclick="applySuggestion('原样返回这行文本测试基础通道。')">通道基线测试 (Echo)</div>
                    <div class="suggestion-chip" onclick="applySuggestion('(12.5 * 4) / (2.5 + 2.5)')">解算数学表达式 (Calculator)</div>
                    <div class="suggestion-chip" onclick="applySuggestion('总结：人工智能技术深度融入教育教学的全部要素和全过程，有助于因材施教、促进科研高效协同，提高创新人才培养质量。')">提取文本摘要 (Summary)</div>
                </div>

                <div class="controls-bar">
                    <!-- Manual/Auto Selection -->
                    <div class="selector-group">
                        <span class="selector-label">路由模式:</span>
                        <select class="skill-select" id="skillSelect">
                            <option value="auto">智能分发模式 (自动匹配 Skill)</option>
                            <option value="echo_skill">强制指定: Echo Skill (基线测试)</option>
                            <option value="calculator_skill">强制指定: Secure Calculator (计算器)</option>
                            <option value="summary_skill">强制指定: Text Summarizer (文本总结)</option>
                        </select>
                    </div>
                </div>

                <div class="input-wrapper">
                    <input type="text" class="chat-input" id="chatInput" placeholder="描述您的学术需求或直接粘贴数学表达式..." onkeydown="handleKey(event)">
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送请求</button>
                </div>
            </div>
        </div>

        <!-- Right Panel: Inspector Panel -->
        <div class="inspector-panel">
            <div class="inspector-header">
                <h3>🔍 接口报文监视器 (Inspector)</h3>
                <p style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">展示后端返回的原始 API JSON 报文</p>
            </div>
            <div class="inspector-content" id="jsonInspector">{ "status": "等待接口事务进行交互..." }</div>
        </div>
    </div>

    <script>
        const API_URL = "";
        let researchSessionId = sessionStorage.getItem("researchSessionId");

        // Load active skills at startup
        async function loadSkills() {
            try {
                const res = await fetch(`${API_URL}/api/skills`);
                if (!res.ok) throw new Error("获取技能库列表失败。");
                const skills = await res.json();
                
                const skillListDiv = document.getElementById("skillList");
                const skillSelect = document.getElementById("skillSelect");
                skillListDiv.innerHTML = "";
                skillSelect.innerHTML = '<option value="auto">智能分发模式 (自动匹配 Skill)</option>';
                
                skills.forEach(skill => {
                    const card = document.createElement("div");
                    card.className = "skill-card";
                    card.onclick = () => {
                        document.getElementById("skillSelect").value = skill.name;
                    };
                    const option = document.createElement("option");
                    option.value = skill.name;
                    option.textContent = `强制指定: ${skill.display_name}`;
                    skillSelect.appendChild(option);
                    
                    const paramsJson = JSON.stringify(skill.parameters_schema, null, 2);
                    
                    card.innerHTML = `
                        <div class="skill-card-header">
                            <span class="skill-name">${escapeHtml(skill.display_name)}</span>
                            <span class="skill-version">v${escapeHtml(skill.version)}</span>
                        </div>
                        <div class="skill-desc">${escapeHtml(skill.description)}</div>
                        <div class="skill-schema">${escapeHtml(paramsJson)}</div>
                    `;
                    skillListDiv.appendChild(card);
                });
            } catch (err) {
                showError(`加载技能库异常: ${err.message}`);
            }
        }

        // Load API Configuration
        async function loadConfig() {
            try {
                const res = await fetch(`${API_URL}/api/config`);
                if (!res.ok) throw new Error("获取配置失败。");
                const config = await res.json();
                if (config.api_key) {
                    document.getElementById("cfgApiKey").value = config.api_key;
                }
                if (config.base_url) {
                    document.getElementById("cfgBaseUrl").value = config.base_url;
                }
                if (config.model) {
                    document.getElementById("cfgModel").value = config.model;
                }
            } catch (err) {
                console.error("加载配置失败:", err);
            }
        }

        // Save API Configuration
        async function saveConfig() {
            const apiKey = document.getElementById("cfgApiKey").value.trim();
            const baseUrl = document.getElementById("cfgBaseUrl").value.trim();
            const model = document.getElementById("cfgModel").value.trim();

            try {
                const res = await fetch(`${API_URL}/api/config`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        api_key: apiKey,
                        base_url: baseUrl,
                        model: model
                    })
                });
                if (!res.ok) throw new Error(`HTTP 异常 ${res.status}`);
                const data = await res.json();
                
                // Show temporary success notice
                const banner = document.getElementById("errorBanner");
                banner.style.backgroundColor = "rgba(16, 185, 129, 0.1)";
                banner.style.borderColor = "var(--success-color)";
                banner.style.color = "var(--success-color)";
                banner.textContent = "大模型 API 配置保存并应用成功！";
                banner.style.display = "block";
                setTimeout(() => {
                    banner.style.display = "none";
                    banner.style.backgroundColor = "rgba(239, 68, 68, 0.1)";
                    banner.style.borderColor = "var(--error-color)";
                    banner.style.color = "var(--error-color)";
                }, 3000);

                // Reload skills lists just in case
                loadSkills();
            } catch (err) {
                showError(`保存配置失败: ${err.message}`);
            }
        }

        // Apply suggestions to input
        function applySuggestion(text) {
            document.getElementById("chatInput").value = text;
            document.getElementById("chatInput").focus();
        }

        // Handle Enter key on input
        function handleKey(e) {
            if (e.key === "Enter") {
                sendMessage();
            }
        }

        function showError(msg) {
            const banner = document.getElementById("errorBanner");
            banner.textContent = msg;
            banner.style.display = "block";
            setTimeout(() => {
                banner.style.display = "none";
            }, 6000);
        }

        // Send chat message
        async function sendMessage() {
            const input = document.getElementById("chatInput");
            const sendBtn = document.getElementById("sendBtn");
            const select = document.getElementById("skillSelect");
            
            const message = input.value.trim();
            if (!message) return;
            
            // Lock input and button
            input.disabled = true;
            sendBtn.disabled = true;
            input.value = "";
            
            // Append User Message to UI
            appendUserMessage(message);
            
            // Appending temporary agent thinking bubble
            const thinkingId = appendThinkingBubble();
            
            const preferredSkill = select.value === "auto" ? null : select.value;
            
            try {
                const res = await fetch(`${API_URL}/api/chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: message,
                        preferred_skill: preferredSkill,
                        session_id: researchSessionId
                    })
                });
                
                if (!res.ok) throw new Error(`HTTP 异常 ${res.status}`);
                const data = await res.json();
                if (data.session_id) {
                    researchSessionId = data.session_id;
                    sessionStorage.setItem("researchSessionId", researchSessionId);
                }
                if (data.outputs && data.outputs.completed) {
                    researchSessionId = null;
                    sessionStorage.removeItem("researchSessionId");
                }
                
                // Show JSON in Inspector panel
                document.getElementById("jsonInspector").textContent = JSON.stringify(data, null, 2);
                
                // Remove thinking bubble
                removeElement(thinkingId);
                
                // Append Agent Response and Trace details
                appendAgentMessage(data);
                
            } catch (err) {
                removeElement(thinkingId);
                showError(`接口通信失败: ${err.message}`);
                appendSystemErrorMessage(`接口请求失败: ${err.message}`);
            } finally {
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }

        function appendUserMessage(text) {
            const container = document.getElementById("messagesContainer");
            const msg = document.createElement("div");
            msg.className = "message user";
            msg.innerHTML = `
                <div class="message-bubble">${escapeHtml(text)}</div>
                <div class="message-meta">
                    <span>你 (发送的请求)</span>
                </div>
            `;
            container.appendChild(msg);
            scrollChat();
        }

        function appendThinkingBubble() {
            const container = document.getElementById("messagesContainer");
            const id = "thinking_" + Date.now();
            const msg = document.createElement("div");
            msg.className = "message agent";
            msg.id = id;
            msg.innerHTML = `
                <div class="message-bubble" style="color: var(--text-muted);">
                    智能体正在对输入数据进行分析，分发最合适的 Skill 任务中...
                </div>
            `;
            container.appendChild(msg);
            scrollChat();
            return id;
        }

        function removeElement(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function appendAgentMessage(data) {
            const container = document.getElementById("messagesContainer");
            const msg = document.createElement("div");
            msg.className = "message agent";
            
            // Format parameters JSON
            const inputsStr = JSON.stringify(data.inputs);
            const outputsStr = JSON.stringify(data.outputs);
            
            let statusBadgeColor = data.success ? 'var(--success-color)' : 'var(--error-color)';
            let statusText = data.success ? '执行成功 (Success)' : '执行失败 (Failed)';

            msg.innerHTML = `
                <div class="message-bubble">
                    ${escapeHtml(data.reply).replace(/\n/g, '<br/>')}
                </div>
                
                <!-- Routing Trace Panel -->
                <div class="routing-trace">
                    <div class="trace-header">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                        </svg>
                        <span>智能体路由决策步骤追踪</span>
                    </div>
                    <div class="trace-step"><strong>路由模式</strong>: ${escapeHtml(data.route_mode)}</div>
                    <div class="trace-step"><strong>所选 Skill</strong>: ${escapeHtml(data.skill_name)}</div>
                    <div class="trace-step"><strong>决策依据</strong>: ${escapeHtml(data.reason)}</div>
                    <div class="trace-step"><strong>输入参数</strong>: ${escapeHtml(inputsStr)}</div>
                    <div class="trace-step"><strong>输出结果</strong>: ${escapeHtml(outputsStr)}</div>
                    <div class="trace-step"><strong>执行状态</strong>: <span style="color: ${statusBadgeColor}; font-weight:bold;">${statusText}</span></div>
                </div>

                <div class="message-meta">
                    <span>智能体回复</span>
                    <span>•</span>
                    <span>运行耗时: ${data.duration_ms.toFixed(1)} ms</span>
                    <span>•</span>
                    <span style="font-family: monospace;">事务ID: ${data.request_id.substring(0, 8)}</span>
                </div>
            `;
            container.appendChild(msg);
            scrollChat();
        }

        function appendSystemErrorMessage(text) {
            const container = document.getElementById("messagesContainer");
            const msg = document.createElement("div");
            msg.className = "message agent";
            msg.innerHTML = `
                <div class="message-bubble" style="background-color: rgba(239, 68, 68, 0.1); border-color: var(--error-color);">
                    ${escapeHtml(text)}
                </div>
                <div class="message-meta">
                    <span style="color: var(--error-color);">系统故障异常</span>
                </div>
            `;
            container.appendChild(msg);
            scrollChat();
        }

        function scrollChat() {
            const container = document.getElementById("messagesContainer");
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return "";
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        // Initialize
        loadSkills();
        loadConfig();
    </script>
</body>
</html>
