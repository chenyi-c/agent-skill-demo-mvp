<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>智教码航 · 科研 Skill 实验台</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <header class="brand">
        <div class="brand-mark">CN</div>
        <div>
          <h1>智教码航</h1>
          <p>科研 Skill MVP</p>
        </div>
      </header>

      <details class="config-panel" open>
        <summary>模型与来源配置</summary>
        <div class="config-body">
          <label for="cfgApiKey">API Key <span id="keyHint"></span></label>
          <input id="cfgApiKey" type="password" autocomplete="off" placeholder="留空表示保留现有 Key">
          <label for="cfgBaseUrl">Base URL</label>
          <input id="cfgBaseUrl" type="url" placeholder="https://api.openai.com/v1">
          <label for="cfgModel">模型</label>
          <input id="cfgModel" type="text" placeholder="gpt-3.5-turbo">
          <div class="button-row">
            <button id="saveConfigBtn" class="primary">保存配置</button>
            <button id="testLlmBtn">测试模型</button>
          </div>
          <button id="testSourcesBtn" class="wide">测试学术来源</button>
          <p id="configStatus" class="subtle"></p>
        </div>
      </details>

      <section class="skills-section">
        <div class="section-heading">
          <span>Skill 库</span>
          <span id="skillCount" class="pill">0</span>
        </div>
        <div id="skillList" class="skill-list" aria-live="polite"></div>
      </section>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <h2>科研需求与受约束检索</h2>
          <p id="stageText">等待输入</p>
        </div>
        <div id="healthBadge" class="health pending"><span></span>检查服务中</div>
      </header>

      <section id="messages" class="messages" aria-live="polite">
        <article class="message assistant welcome">
          <div class="avatar">AI</div>
          <div class="message-content">
            <div class="bubble">
              先告诉我一个粗略研究想法。我会逐轮确认研究目标、范围、来源和年份；只有你确认检索计划后，才会访问白名单内的学术来源。
            </div>
          </div>
        </article>
      </section>

      <section id="workflowBar" class="workflow-bar hidden">
        <div id="workflowSummary"></div>
        <div class="button-row">
          <button id="confirmSearchBtn" class="primary hidden">确认并开始检索</button>
          <button id="restartBtn">重新开始</button>
          <button id="cancelBtn" class="danger">取消会话</button>
        </div>
      </section>

      <footer class="composer">
        <div id="quickActions" class="quick-actions"></div>
        <div class="composer-controls">
          <select id="skillSelect" aria-label="路由模式">
            <option value="">自动路由</option>
          </select>
          <textarea id="chatInput" rows="2" maxlength="20000" placeholder="例如：我想研究演化博弈法，但数据来源还不清楚"></textarea>
          <button id="sendBtn" class="send primary">发送</button>
        </div>
        <p class="composer-hint">Enter 发送，Shift + Enter 换行。学术检索不会自动扩大到全网。</p>
      </footer>
    </main>

    <aside class="inspector">
      <div class="section-heading">
        <span>执行检查器</span>
        <button id="toggleRawBtn" class="text-button">原始 JSON</button>
      </div>
      <div id="inspectorStructured" class="inspector-structured">
        <p class="subtle">执行一次任务后，这里会显示路由、来源状态和耗时。</p>
      </div>
      <pre id="rawJson" class="raw-json hidden">{ "status": "idle" }</pre>
    </aside>
  </div>

  <div id="toast" class="toast hidden" role="alert"></div>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
